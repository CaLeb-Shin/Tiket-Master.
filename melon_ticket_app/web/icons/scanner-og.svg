<svg xmlns="http://www.w3.org/2000/svg" width="600" height="315" viewBox="0 0 600 315">
  <rect width="600" height="315" rx="0" fill="#0B0B0F"/>
  <!-- QR code icon -->
  <g transform="translate(220, 60)" fill="#C9A84C">
    <!-- Top-left corner -->
    <rect x="0" y="0" width="50" height="50" rx="6"/>
    <rect x="10" y="10" width="30" height="30" rx="3" fill="#0B0B0F"/>
    <rect x="16" y="16" width="18" height="18" rx="2" fill="#C9A84C"/>
    <!-- Top-right corner -->
    <rect x="110" y="0" width="50" height="50" rx="6"/>
    <rect x="120" y="10" width="30" height="30" rx="3" fill="#0B0B0F"/>
    <rect x="126" y="16" width="18" height="18" rx="2" fill="#C9A84C"/>
    <!-- Bottom-left corner -->
    <rect x="0" y="110" width="50" height="50" rx="6"/>
    <rect x="10" y="120" width="30" height="30" rx="3" fill="#0B0B0F"/>
    <rect x="16" y="126" width="18" height="18" rx="2" fill="#C9A84C"/>
    <!-- Data dots -->
    <rect x="60" y="8" width="14" height="14" rx="2"/>
    <rect x="82" y="8" width="14" height="14" rx="2"/>
    <rect x="60" y="30" width="14" height="14" rx="2"/>
    <rect x="8" y="60" width="14" height="14" rx="2"/>
    <rect x="30" y="60" width="14" height="14" rx="2"/>
    <rect x="60" y="60" width="14" height="14" rx="2"/>
    <rect x="82" y="60" width="14" height="14" rx="2"/>
    <rect x="60" y="82" width="14" height="14" rx="2"/>
    <rect x="82" y="82" width="14" height="14" rx="2"/>
    <rect x="110" y="60" width="14" height="14" rx="2"/>
    <rect x="132" y="60" width="14" height="14" rx="2"/>
    <rect x="110" y="82" width="14" height="14" rx="2"/>
    <rect x="60" y="110" width="14" height="14" rx="2"/>
    <rect x="82" y="110" width="14" height="14" rx="2"/>
    <rect x="110" y="110" width="14" height="14" rx="2"/>
    <rect x="132" y="110" width="14" height="14" rx="2"/>
    <rect x="82" y="132" width="14" height="14" rx="2"/>
    <rect x="132" y="132" width="14" height="14" rx="2"/>
  </g>
  <!-- Scanner line -->
  <rect x="210" y="138" width="180" height="3" rx="1.5" fill="#C9A84C" opacity="0.5"/>
  <!-- Text -->
  <text x="300" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#C9A84C">멜론티켓 스캐너</text>
  <text x="300" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#808080">QR 스캔으로 입장 확인</text>
</svg>
