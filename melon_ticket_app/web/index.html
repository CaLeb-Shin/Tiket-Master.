  <script>
    // 카카오톡 인앱브라우저 → 외부 브라우저로 강제 전환
    // Flutter CanvasKit이 인앱 브라우저에서 로드 안 되므로 완전 차단
    (function() {
      var ua = navigator.userAgent || '';
      if (!/KAKAOTALK/i.test(ua)) return;

      var url = location.href;

      // Android: Chrome Intent로 바로 열기
      if (/android/i.test(ua)) {
        location.href = 'intent://' + url.replace(/https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end';
      }

      // iOS: 자동 리다이렉트 시도 + 폴백 버튼 페이지
      // kakaotalk://web/openExternal가 실패할 수 있으므로 폴백 UI 제공
      document.write(
        '<!DOCTYPE html><html><head><meta charset="utf-8">' +
        '<meta name="viewport" content="width=device-width,initial-scale=1">' +
        '<style>' +
        'body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0B0B0F;color:#fff;font-family:-apple-system,sans-serif;text-align:center;padding:20px}' +
        '.logo{font-size:24px;font-weight:700;color:#C9A84C;margin-bottom:8px}' +
        '.sub{font-size:14px;color:#999;margin-bottom:32px}' +
        '.btn{display:inline-block;padding:16px 40px;background:#C9A84C;color:#0B0B0F;font-size:16px;font-weight:700;border-radius:12px;text-decoration:none;border:none;cursor:pointer}' +
        '.btn:active{opacity:0.8}' +
        '.note{font-size:12px;color:#666;margin-top:16px}' +
        '</style></head><body>' +
        '<div class="logo">MELON TICKET</div>' +
        '<div class="sub">모바일 티켓을 확인하려면<br>외부 브라우저에서 열어주세요</div>' +
        '<a class="btn" href="' + url + '" target="_blank" rel="noopener">Safari에서 열기</a>' +
        '<p class="note">버튼이 작동하지 않으면<br>링크를 길게 눌러 "Safari에서 열기"를 선택하세요</p>' +
        '<script>setTimeout(function(){location.href="kakaotalk://web/openExternal?url="+encodeURIComponent("' + url + '")},300)<\/script>' +
        '</body></html>'
      );
      document.close();
    })();
  </script>
  <script>
    (function () {
      const host = window.location.hostname;
      const isLocalHost = host === 'localhost' || host === '127.0.0.1' || host === '0.0.0.0';
      if (!isLocalHost || !('serviceWorker' in navigator)) return;
      if (sessionStorage.getItem('local-sw-cleared-v1') === '1') return;

      const clearRegistrations = navigator.serviceWorker
        .getRegistrations()
        .then((registrations) => Promise.all(registrations.map((reg) => reg.unregister())));

      const clearCaches = ('caches' in window)
        ? caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
        : Promise.resolve();

      Promise.all([clearRegistrations, clearCaches]).finally(() => {
        sessionStorage.setItem('local-sw-cleared-v1', '1');
        window.location.reload();
      });
    })();
  </script>

  <script>
    // 카카오 앱키는 환경변수로 관리 (Kakao Developers 콘솔에서 발급)
    // TODO: 실제 JavaScript 앱키로 교체
    if (typeof Kakao !== 'undefined' && !Kakao.isInitialized()) {
      Kakao.init('YOUR_KAKAO_JAVASCRIPT_APP_KEY');
    }

    // 카카오 로그인 → 액세스 토큰 반환
    function loginWithKakao() {
      return new Promise(function(resolve, reject) {
        if (typeof Kakao === 'undefined' || !Kakao.isInitialized()) {
          reject('카카오 SDK가 초기화되지 않았습니다');
          return;
        }
        Kakao.Auth.login({
          success: function(authObj) {
            resolve(authObj.access_token);
          },
          fail: function(err) {
            reject(JSON.stringify(err));
          }
        });
      });
    }

    // 네이버 로그인 (팝업 방식)
    var NAVER_CLIENT_ID = 'xIJ0MGtBMIn4YQgtXchI';
    var NAVER_CALLBACK_URL = window.location.origin + '/naver-callback.html';

    function loginWithNaver() {
      return new Promise(function(resolve, reject) {
        var state = Math.random().toString(36).substr(2);
        var url = 'https://nid.naver.com/oauth2.0/authorize'
          + '?response_type=token'
          + '&client_id=' + NAVER_CLIENT_ID
          + '&redirect_uri=' + encodeURIComponent(NAVER_CALLBACK_URL)
          + '&state=' + state;

        var popup = window.open(url, 'naverLogin', 'width=500,height=600');

        // 팝업에서 콜백으로 토큰 전달
        window._naverLoginResolve = resolve;
        window._naverLoginReject = reject;

        var checkClosed = setInterval(function() {
          if (popup && popup.closed) {
            clearInterval(checkClosed);
            if (window._naverLoginReject) {
              window._naverLoginReject('로그인 취소');
            }
          }
        }, 500);
      });
    }
  </script>
  <script>
    function openKakaoPostcode() {
      return new Promise(function(resolve) {
        new daum.Postcode({
          oncomplete: function(data) {
            resolve(JSON.stringify({
              zonecode: data.zonecode,
              address: data.address,
              roadAddress: data.roadAddress,
              jibunAddress: data.jibunAddress,
              buildingName: data.buildingName,
              sido: data.sido,
              sigungu: data.sigungu,
              bname: data.bname,
            }));
          },
          onclose: function() {
            resolve('');
          }
        }).open();
      });
    }
