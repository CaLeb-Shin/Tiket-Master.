<!DOCTYPE html>
<html>
<head><title>네이버 로그인</title></head>
<body>
<script>
  // URL 쿼리 파라미터에서 code 추출 (response_type=code)
  var params = {};
  window.location.search.substring(1).split('&').forEach(function(pair) {
    var kv = pair.split('=');
    params[kv[0]] = decodeURIComponent(kv[1] || '');
  });

  if (params.code && window.opener) {
    // "code|redirectUri" 문자열로 전달 (Dart JSString 호환)
    window.opener._naverLoginResolve(
      params.code + '|' + window.opener._naverCallbackUrl
    );
    window.opener._naverLoginResolve = null;
    window.opener._naverLoginReject = null;
  } else if (window.opener && window.opener._naverLoginReject) {
    window.opener._naverLoginReject(params.error_description || '인증 코드를 받지 못했습니다');
  }
  window.close();
</script>
</body>
</html>
